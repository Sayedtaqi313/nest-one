services:
  backend:
    container_name: nest-backend
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - '3000:3000'
    env_file:
      - .env
    depends_on:
      - postgres
    networks:
      - backend-network

  postgres:
    container_name: postgres-db
    image: postgres:17-alpine
    restart: unless-stopped

    environment:
      POSTGRES_DB: nestdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123456

    ports:
      - '5432:5432'

    volumes:
      - postgres_data:/var/lib/postgresql/data

    networks:
      - backend-network

volumes:
  postgres_data:

networks:
  backend-network:
