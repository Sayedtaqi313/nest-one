name: First test

push:
  on:
    branches:
      - main

jobs:
  deploy:
  runs-on: ubuntu-latest

  steps:
  name: Checkout
  uses: actions/checkout@v4

  name: Ssh to server
  uses: appleboy/ssh-action@v1.2.2
  with:
    host: ${{ secrets.SSH_HOST }}
    username: ${{ secrets.SSH_USER }}
    key: ${{ secrets.SSH_KEY }}
    scripts: |
      docker compose --build
      docker compose up -d

